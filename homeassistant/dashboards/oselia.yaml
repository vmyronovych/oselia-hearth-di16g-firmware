# OSELIA Hearth dashboard (Sections view) -- per-unit (device 893922).
# Generated; logo is embedded as a self-contained data URI (no www copy).
# Adapt entity ids (hearth_<id>_...) per gateway. Pushed live via WS.

title: OSELIA Hearth
views:
  - type: sections
    title: Hearth
    path: hearth
    icon: "mdi:home-lightning-bolt"
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: picture
            image: "data:image/svg+xml;base64,PD94bWwgdmVyc2...(logo data URI)..."
            tap_action:
              action: none
            alt_text: OSELIA Hearth
          - type: heading
            heading: Status
            heading_style: title
            icon: "mdi:heart-pulse"
          - type: tile
            entity: sensor.hearth_893922_diagnostics
            name: Health
          - type: tile
            entity: update.hearth_893922_firmware
            name: Firmware
          - type: markdown
            show_empty: false
            content: >-
              {% set e = state_attr('update.hearth_893922_firmware',
              'release_feed_error') %}{% if e %}### ⚠️ Firmware updates
              unavailable

              {{ e }}{% endif %}
          - type: tile
            entity: binary_sensor.hearth_893922_ethernet_link
            name: Ethernet
          - type: tile
            entity: sensor.hearth_893922_ip_address
            name: IP address
          - type: tile
            entity: sensor.hearth_893922_uptime
            name: Uptime
          - type: tile
            entity: sensor.hearth_893922_temperature
            name: Temperature
          - type: tile
            entity: sensor.hearth_893922_input_boards
            name: Input boards
          - type: tile
            entity: sensor.hearth_893922_input_boards_responding
            name: Boards responding
          - type: tile
            entity: sensor.hearth_893922_last_reset_cause
            name: Last reset
          - type: tile
            entity: sensor.hearth_893922_reconnects
            name: Reconnects
          - type: tile
            entity: sensor.hearth_893922_dropped_events
            name: Dropped
          - type: tile
            entity: sensor.hearth_893922_i2c_bus_recoveries
            name: I²C bus recoveries
          - type: tile
            entity: sensor.hearth_893922_mcp_resets
            name: MCP resets
          - type: logbook
            title: Recent faults
            entities:
              - event.hearth_893922_fault
      - type: grid
        cards:
          - type: heading
            heading: Wall switches · board 1
            heading_style: title
            icon: "mdi:light-switch"
          - type: tile
            entity: binary_sensor.hearth_893922_board_1_mcp
            name: MCP chip
          - type: tile
            entity: sensor.hearth_893922_board_1_mcp_error
            name: MCP last error
          - type: tile
            entity: event.hearth_893922_board_1_input_1
