# Hearth (DI16-G) dashboard (Lovelace) — manual-import reference.
#
# The provisioning wizard (`provision.py --ha-setup`) builds and pushes an equivalent
# dashboard automatically, from the entities HA actually created for the unit (and
# including the OSELIA logo header). This file is the hand-import fallback.
#
# Entity IDs below assume the HA device name "Hearth" (-> slug `hearth`). With several
# gateways HA suffixes duplicates (_2, ...); the wizard renders a correct per-unit copy.
#
# Install: Settings -> Dashboards -> + -> "Edit in YAML" and paste a view, or add as a
# YAML-mode dashboard in configuration.yaml. For the logo header, copy
# ../hearth_logo.svg to <config>/www/ and use `image: /local/hearth_logo.svg`.
title: Hearth
views:
  - title: Switches
    path: switches
    icon: mdi:light-switch
    cards:
      - type: picture
        image: /local/hearth_logo.svg      # copy ../hearth_logo.svg to <config>/www/
      - type: entities
        title: Wall switches (last press)
        show_header_toggle: false
        entities:
          - event.hearth_board1_input1
          - event.hearth_board1_input2
          - event.hearth_board1_input3
          - event.hearth_board1_input4
          - event.hearth_board1_input5
          - event.hearth_board1_input6
          - event.hearth_board1_input7
          - event.hearth_board1_input8
          - event.hearth_board1_input9
          - event.hearth_board1_input10
          - event.hearth_board1_input11
          - event.hearth_board1_input12
          - event.hearth_board1_input13
          - event.hearth_board1_input14
          - event.hearth_board1_input15
          - event.hearth_board1_input16

  - title: Diagnostics
    path: diagnostics
    icon: mdi:heart-pulse
    cards:
      - type: entities
        title: Controls
        entities:
          - button.hearth_restart
          - button.hearth_identify
          - number.hearth_long_press_time
          - number.hearth_double_tap_window
          - number.hearth_debounce_time
          - select.hearth_log_level
      - type: entities
        title: Health & telemetry
        entities:
          - binary_sensor.hearth_ethernet_link
          - sensor.hearth_ip_address
          - sensor.hearth_uptime
          - sensor.hearth_input_boards_online
          - sensor.hearth_board_addresses
          - sensor.hearth_temperature
          - sensor.hearth_free_memory
          - sensor.hearth_reconnects
          - sensor.hearth_dropped_events
          - sensor.hearth_last_input
          - sensor.hearth_last_log
