      entity: event.hearth_893922_board_1_input_15
      name: Input 15
      icon: mdi:gesture-tap-button
    - type: tile
      entity: event.hearth_893922_board_1_input_16
      name: Input 16
      icon: mdi:gesture-tap-button
  - type: grid
    cards:
    - type: heading
      heading: Controls
      heading_style: title
      icon: mdi:tune-vertical
    - type: tile
      entity: button.hearth_893922_restart
      name: Restart
    - type: tile
      entity: button.hearth_893922_identify
      name: Identify
    - type: entities
      title: Gesture tuning
      show_header_toggle: false
      entities:
      - entity: number.hearth_893922_long_press_time
        name: Long press
      - entity: number.hearth_893922_double_tap_window
        name: Double-tap window
      - entity: number.hearth_893922_debounce_time
        name: Debounce
      - entity: select.hearth_893922_log_level
        name: Log level
    - type: entities
      title: Topology
      show_header_toggle: false
      entities:
      - entity: sensor.hearth_893922_board_addresses
        name: Board addresses
      - entity: sensor.hearth_893922_last_input
        name: Last input
