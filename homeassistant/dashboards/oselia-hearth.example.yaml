# OSELIA Hearth dashboard -- generated by `oselia dashboard render`.
# Paste into Home Assistant: new dashboard -> Edit -> raw configuration
# editor (or a YAML-mode dashboard). Adjust entity ids if you renamed the
# device. Logo is embedded as a self-contained data URI.
title: OSELIA Hearth
views:
- type: sections
  title: Hearth 893922
  path: gw-893922
  icon: mdi:home-lightning-bolt
  max_columns: 3
  sections:
  - type: grid
    cards:
    - type: picture
      image: data:image/svg+xml;base64,
      tap_action:
        action: none
      alt_text: OSELIA Hearth
    - type: heading
      heading: Status
      heading_style: title
      icon: mdi:heart-pulse
    - type: tile
      entity: sensor.hearth_893922_diagnostics
      name: Health
    - type: tile
      entity: update.hearth_893922_firmware
      name: Firmware
    - type: markdown
      show_empty: false
      content: '{% set e = state_attr(''update.hearth_893922_firmware'', ''release_feed_error'') %}{%
        if e %}### ⚠️ Firmware updates unavailable


        {{ e }}{% endif %}'
    - type: tile
      entity: binary_sensor.hearth_893922_ethernet_link
      name: Ethernet
    - type: tile
      entity: sensor.hearth_893922_ip_address
      name: IP address
    - type: tile
      entity: sensor.hearth_893922_uptime
      name: Uptime
    - type: tile
      entity: sensor.hearth_893922_temperature
      name: Temperature
    - type: tile
      entity: sensor.hearth_893922_input_boards
      name: Input boards
    - type: tile
      entity: sensor.hearth_893922_input_boards_responding
      name: Boards responding
    - type: tile
      entity: sensor.hearth_893922_last_reset_cause
      name: Last reset
    - type: tile
      entity: sensor.hearth_893922_reconnects
      name: Reconnects
    - type: tile
      entity: sensor.hearth_893922_dropped_events
      name: Dropped
    - type: tile
      entity: sensor.hearth_893922_i2c_bus_recoveries
      name: I²C bus recoveries
    - type: tile
      entity: sensor.hearth_893922_mcp_resets
      name: MCP resets
    - type: markdown
      title: Recent faults
      content: '{% set lf = state_attr(''sensor.hearth_893922_diagnostics'', ''last_fault'') %}{% if lf
        %}**Now:** `{{ lf.code }}`{% if lf.get(''board'') is not none %} · board {{ lf.board }}{% endif
        %} — {{ lf.detail }}


        {% endif %}{% set r = state_attr(''sensor.hearth_893922_diagnostics'', ''recent'') or [] %}{%
        if r %}{% for f in (r[-12:] | reverse) %}- `{{ f.code }}`{% if f.get(''board'') is not none %}
        (b{{ f.board }}){% endif %} — {{ f.detail }}

        {% endfor %}{% else %}_No faults recorded._{% endif %}'
  - type: grid
    cards:
    - type: heading
      heading: Wall switches · board 1
      heading_style: title
      icon: mdi:light-switch
    - type: tile
      entity: binary_sensor.hearth_893922_board_1_mcp
      name: MCP chip
    - type: tile
      entity: sensor.hearth_893922_board_1_mcp_error
      name: MCP last error
    - type: tile
      entity: event.hearth_893922_board_1_input_1
      name: Input 1
      icon: mdi:gesture-tap-button
    - type: tile
      entity: event.hearth_893922_board_1_input_2
      name: Input 2
      icon: mdi:gesture-tap-button
    - type: tile
      entity: event.hearth_893922_board_1_input_3
      name: Input 3
      icon: mdi:gesture-tap-button
    - type: tile
      entity: event.hearth_893922_board_1_input_4
      name: Input 4
      icon: mdi:gesture-tap-button
    - type: tile
      entity: event.hearth_893922_board_1_input_5
      name: Input 5
      icon: mdi:gesture-tap-button
    - type: tile
      entity: event.hearth_893922_board_1_input_6
      name: Input 6
      icon: mdi:gesture-tap-button
    - type: tile
      entity: event.hearth_893922_board_1_input_7
      name: Input 7
      icon: mdi:gesture-tap-button
    - type: tile
      entity: event.hearth_893922_board_1_input_8
      name: Input 8
      icon: mdi:gesture-tap-button
    - type: tile
      entity: event.hearth_893922_board_1_input_9
      name: Input 9
      icon: mdi:gesture-tap-button
    - type: tile
      entity: event.hearth_893922_board_1_input_10
      name: Input 10
      icon: mdi:gesture-tap-button
    - type: tile
      entity: event.hearth_893922_board_1_input_11
      name: Input 11
      icon: mdi:gesture-tap-button
    - type: tile
      entity: event.hearth_893922_board_1_input_12
      name: Input 12
      icon: mdi:gesture-tap-button
    - type: tile
      entity: event.hearth_893922_board_1_input_13
      name: Input 13
      icon: mdi:gesture-tap-button
    - type: tile
      entity: event.hearth_893922_board_1_input_14
      name: Input 14
      icon: mdi:gesture-tap-button
